<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NAA - Login & Signup</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap');

        body {
            background: linear-gradient(120deg, #000000 0%, #222222 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            color: #fff;
            overflow: hidden;
        }

        .container {
            background: rgba(20, 20, 20, 0.9);
            border-radius: 15px;
            box-shadow: 0 0 25px rgb(8, 129, 121);
            width: 100%;
            max-width: 450px;
            height: auto;
            min-height: 600px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            transform: scale(0.95);
            animation: scaleIn 0.5s forwards;
            position: relative;
            overflow: hidden;
        }

        .container::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: linear-gradient(45deg, transparent, rgba(8, 129, 120, 0.1), transparent);
            transform: rotate(0deg);
            animation: rotate 10s linear infinite;
            z-index: 0;
        }

        .header {
            background: linear-gradient(to right, #0a0a0a, #1a1a1a);
            padding: 25px 30px 20px;
            text-align: center;
            position: relative;
            z-index: 1;
            border-bottom: 1px solid rgba(8, 129, 120, 0.3);
        }

        .logo-container {
            display: flex;
            justify-content: center;
            align-items: center;
            margin-bottom: 12px;
        }

        .logo {
            height: 90px;
            width: 90px;
            border-radius: 50%;
            background: linear-gradient(145deg, #088178, #0aa896);
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: 0 0 25px rgba(8, 129, 120, 0.7);
            border: 3px solid rgba(255, 255, 255, 0.1);
            transition: all 0.5s ease;
            position: relative;
            overflow: hidden;
        }

        .logo::before {
            content: '';
            position: absolute;
            width: 150%;
            height: 150%;
            background: conic-gradient(transparent, transparent, transparent, #0aa896);
            animation: rotate-border 4s linear infinite;
        }

        .logo::after {
            content: '';
            position: absolute;
            inset: 3px;
            background: linear-gradient(145deg, #0c0c0c, #1a1a1a);
            border-radius: 50%;
        }

        .logo-text {
            position: relative;
            z-index: 1;
            color: #fff;
            font-size: 22px;
            font-weight: 700;
            letter-spacing: 1px;
            text-shadow: 0 0 10px rgba(8, 129, 120, 0.8);
        }

        .logo:hover {
            transform: scale(1.05) rotate(5deg);
            box-shadow: 0 0 35px rgba(8, 129, 120, 0.9);
        }

        .brand-name {
            font-size: 22px;
            font-weight: 700;
            background: linear-gradient(to right, #088178, #0aa896);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 2px 10px rgba(8, 129, 120, 0.5);
            letter-spacing: 1px;
            margin-top: 8px;
        }

        .brand-tagline {
            font-size: 12px;
            color: #bbb;
            margin-top: 4px;
            letter-spacing: 0.5px;
        }

        .form-container {
            padding: 20px;
            position: relative;
            z-index: 1;
        }

        .tabs {
            display: flex;
            margin-bottom: 18px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            position: relative;
        }

        .tab {
            padding: 10px 12px;
            background: none;
            border: none;
            cursor: pointer;
            font-size: 15px;
            font-weight: 600;
            color: #777;
            flex: 1;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .tab::before {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 3px;
            background: #088178;
            transform: translateX(-100%);
            transition: transform 0.3s ease;
        }

        .tab.active {
            color: #fff;
        }

        .tab.active::before {
            transform: translateX(0);
        }

        .form {
            display: none;
            opacity: 0;
            transform: translateY(20px);
            transition: opacity 0.5s, transform 0.5s;
        }

        .form.active {
            display: block;
            opacity: 1;
            transform: translateY(0);
            animation: fadeIn 0.5s forwards;
        }

        .form h2 {
            text-align: center;
            margin-bottom: 18px;
            color: #fff;
            font-weight: 600;
            text-shadow: 0 2px 10px rgba(8, 129, 120, 0.5);
            font-size: 18px;
        }

        .input-group {
            margin-bottom: 16px;
            position: relative;
        }

        .input-group label {
            display: block;
            margin-bottom: 6px;
            font-weight: 500;
            color: #ddd;
            font-size: 12px;
        }

        .input-group input {
            width: 100%;
            padding: 12px 16px;
            background: rgba(30, 30, 30, 0.7);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            font-size: 13px;
            transition: all 0.3s ease;
            color: #fff;
            box-shadow: inset 0 2px 4px rgba(0, 0, 0, 0.3);
        }

        .input-group input:focus {
            border-color: #088178;
            outline: none;
            box-shadow: 0 0 15px rgba(8, 129, 120, 0.3);
            transform: translateY(-2px);
        }

        .input-group i {
            position: absolute;
            right: 15px;
            top: 38px;
            color: #088178;
            font-size: 14px;
        }

        /* Destination Selection Styles */
        .destination-selection {
            margin: 15px 0;
            padding: 15px;
            background: rgba(30, 30, 30, 0.7);
            border-radius: 8px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .destination-selection h3 {
            font-size: 14px;
            margin-bottom: 10px;
            color: #ddd;
            text-align: center;
        }

        .destination-options {
            display: flex;
            gap: 10px;
        }

        .destination-option {
            flex: 1;
            padding: 10px;
            background: rgba(40, 40, 40, 0.7);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 6px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .destination-option:hover {
            background: rgba(50, 50, 50, 0.7);
            transform: translateY(-2px);
        }

        .destination-option.selected {
            background: rgba(8, 129, 120, 0.3);
            border-color: #088178;
            box-shadow: 0 0 10px rgba(8, 129, 120, 0.5);
        }

        .destination-icon {
            font-size: 20px;
            margin-bottom: 5px;
            color: #088178;
        }

        .destination-text {
            font-size: 12px;
            font-weight: 500;
        }

        .btn {
            width: 100%;
            padding: 12px;
            background: linear-gradient(45deg, #088178, #0aa896);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 8px;
            box-shadow: 0 5px 15px rgba(8, 129, 120, 0.4);
            position: relative;
            overflow: hidden;
        }

        .btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.2), transparent);
            transition: 0.5s;
        }

        .btn:hover::before {
            left: 100%;
        }

        .btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 20px rgba(8, 129, 120, 0.6);
        }

        .btn:active {
            transform: translateY(0);
        }

        .footer {
            text-align: center;
            margin-top: 16px;
            color: #888;
            font-size: 12px;
        }

        .footer a {
            color: #088178;
            text-decoration: none;
            font-weight: 600;
            transition: all 0.3s ease;
            position: relative;
        }

        .footer a::after {
            content: '';
            position: absolute;
            bottom: -2px;
            left: 0;
            width: 0;
            height: 2px;
            background: #088178;
            transition: width 0.3s ease;
        }

        .footer a:hover::after {
            width: 100%;
        }

        .footer a:hover {
            color: #0aa896;
        }

        .message {
            padding: 8px;
            margin: 10px 0;
            border-radius: 8px;
            text-align: center;
            display: none;
            animation: shake 0.5s ease;
            font-size: 12px;
        }

        .error {
            background: rgba(211, 47, 47, 0.2);
            color: #ff5252;
            border: 1px solid rgba(211, 47, 47, 0.3);
        }

        .success {
            background: rgba(56, 142, 60, 0.2);
            color: #69f0ae;
            border: 1px solid rgba(56, 142, 60, 0.3);
        }

        .social-login {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-top: 12px;
        }

        .social-btn {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(30, 30, 30, 0.7);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: #fff;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .social-btn:hover {
            transform: translateY(-5px);
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.3);
        }

        .facebook:hover {
            background: #3b5998;
        }

        .google:hover {
            background: #dd4b39;
        }

        .twitter:hover {
            background: #1da1f2;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes scaleIn {
            from {
                transform: scale(0.95);
                opacity: 0;
            }
            to {
                transform: scale(1);
                opacity: 1;
            }
        }

        @keyframes shake {
            0%, 100% {
                transform: translateX(0);
            }
            25% {
                transform: translateX(-5px);
            }
            75% {
                transform: translateX(5px);
            }
        }

        @keyframes rotate {
            0% {
                transform: rotate(0deg);
            }
            100% {
                transform: rotate(360deg);
            }
        }

        @keyframes rotate-border {
            from {
                transform: rotate(0deg);
            }
            to {
                transform: rotate(360deg);
            }
        }

        @media (max-width: 500px) {
            .form-container {
                padding: 15px;
            }

            .tab {
                padding: 8px 10px;
                font-size: 13px;
            }

            .header {
                padding: 20px 15px 12px;
            }

            .logo {
                height: 75px;
                width: 75px;
            }

            .logo-text {
                font-size: 18px;
            }

            .brand-name {
                font-size: 18px;
            }

            .input-group input {
                padding: 10px 12px;
            }

            .input-group i {
                top: 36px;
            }
            
            .destination-options {
                flex-direction: column;
            }
        }

        @media (max-height: 700px) {
            .container {
                height: auto;
                min-height: 500px;
            }
            
            .header {
                padding: 15px 15px 10px;
            }
            
            .logo {
                height: 70px;
                width: 70px;
            }
            
            .logo-text {
                font-size: 16px;
            }
            
            .form-container {
                padding: 12px;
            }
            
            .input-group {
                margin-bottom: 12px;
            }
            
            .social-login {
                margin-top: 8px;
            }
            
            .brand-name {
                font-size: 16px;
            }
            
            .form h2 {
                font-size: 16px;
                margin-bottom: 12px;
            }
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="header">
            <div class="logo-container">
                <div class="logo">
                    <div class="logo-text">NAA</div>
                </div>
            </div>
            <div class="brand-name">NAA Store</div>
            <div class="brand-tagline">Style That Defines You</div>
        </div>

        <div class="form-container">
            <div class="tabs">
                <button class="tab active" id="login-tab">Login</button>
                <button class="tab" id="signup-tab">Sign Up</button>
            </div>

            <div id="error-message" class="message error"></div>
            <div id="success-message" class="message success"></div>

            <form id="login-form" class="form active">
                <h2>Welcome Back</h2>
                <div class="input-group">
                    <label for="login-email">Email</label>
                    <input type="email" id="login-email" placeholder="Enter your email" required>
                    <i class="fas fa-envelope"></i>
                </div>
                <div class="input-group">
                    <label for="login-password">Password</label>
                    <input type="password" id="login-password" placeholder="Enter your password" required>
                    <i class="fas fa-lock"></i>
                </div>
                
                <!-- Destination Selection (Only in Login Form) -->
                <div class="destination-selection">
                    <h3>Where would you like to go?</h3>
                    <div class="destination-options">
                        <div class="destination-option selected" data-destination="dashboard">
                            <div class="destination-text">Dashboard</div>
                        </div>
                        <div class="destination-option" data-destination="store">
                            <div class="destination-text">Store</div>
                        </div>
                    </div>
                </div>
                
                <button type="submit" class="btn">Login</button>

                <div class="social-login">
                    <div class="social-btn facebook">
                        <i class="fab fa-facebook-f"></i>
                    </div>
                    <div class="social-btn google">
                        <i class="fab fa-google"></i>
                    </div>
                    <div class="social-btn twitter">
                        <i class="fab fa-twitter"></i>
                    </div>
                </div>

                <div class="footer">
                    <p>Don't have an account? <a href="#" id="go-to-signup">Sign up</a></p>
                </div>
            </form>

            <form id="signup-form" class="form">
                <h2>Create Account</h2>
                
                <div class="input-group">
                    <label for="signup-email">Email</label>
                    <input type="email" id="signup-email" placeholder="Enter your email" required>
                    <i class="fas fa-envelope"></i>
                </div>
                <div class="input-group">
                    <label for="signup-password">Password</label>
                    <input type="password" id="signup-password" placeholder="Create a password (min. 6 characters)"
                        required>
                    <i class="fas fa-lock"></i>
                </div>
                <div class="input-group">
                    <label for="signup-confirm">Confirm Password</label>
                    <input type="password" id="signup-confirm" placeholder="Confirm your password" required>
                    <i class="fas fa-lock"></i>
                </div>
                
                <button type="submit" class="btn">Sign Up</button>

                <div class="social-login">
                    <div class="social-btn facebook">
                        <i class="fab fa-facebook-f"></i>
                    </div>
                    <div class="social-btn google">
                        <i class="fab fa-google"></i>
                    </div>
                    <div class="social-btn twitter">
                        <i class="fab fa-twitter"></i>
                    </div>
                </div>

                <div class="footer">
                    <p>Already have an account? <a href="#" id="go-to-login">Login</a></p>
                </div>
            </form>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            // DOM elements
            const loginTab = document.getElementById('login-tab');
            const signupTab = document.getElementById('signup-tab');
            const loginForm = document.getElementById('login-form');
            const signupForm = document.getElementById('signup-form');
            const goToSignup = document.getElementById('go-to-signup');
            const goToLogin = document.getElementById('go-to-login');
            const errorMessage = document.getElementById('error-message');
            const successMessage = document.getElementById('success-message');
            
            // Destination selection
            let selectedDestination = 'dashboard'; // Default selection
            const destinationOptions = document.querySelectorAll('.destination-option');

            // Initialize destination selection
            function initDestinationSelection() {
                destinationOptions.forEach(option => {
                    option.addEventListener('click', function() {
                        // Remove selected class from all options
                        destinationOptions.forEach(opt => opt.classList.remove('selected'));
                        
                        // Add selected class to clicked option
                        this.classList.add('selected');
                        
                        // Update selected destination
                        selectedDestination = this.getAttribute('data-destination');
                    });
                });
            }

            // Show message function
            function showMessage(element, text) {
                element.textContent = text;
                element.style.display = 'block';
                setTimeout(() => {
                    element.style.display = 'none';
                }, 5000);
            }

            // Switch to signup form
            signupTab.addEventListener('click', function () {
                loginForm.classList.remove('active');
                signupForm.classList.add('active');
                loginTab.classList.remove('active');
                signupTab.classList.add('active');
                errorMessage.style.display = 'none';
                successMessage.style.display = 'none';
            });

            goToSignup.addEventListener('click', function (e) {
                e.preventDefault();
                signupTab.click();
            });

            // Switch to login form
            loginTab.addEventListener('click', function () {
                signupForm.classList.remove('active');
                loginForm.classList.add('active');
                signupTab.classList.remove('active');
                loginTab.classList.add('active');
                errorMessage.style.display = 'none';
                successMessage.style.display = 'none';
            });

            goToLogin.addEventListener('click', function (e) {
                e.preventDefault();
                loginTab.click();
            });

            // Form validation
            function validateEmail(email) {
                const re = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
                return re.test(email);
            }

            // Form submission
            loginForm.addEventListener('submit', function (e) {
                e.preventDefault();
                const email = document.getElementById('login-email').value;
                const password = document.getElementById('login-password').value;

                // Validation
                if (!email || !password) {
                    showMessage(errorMessage, 'Please fill in all fields');
                    return;
                }

                if (!validateEmail(email)) {
                    showMessage(errorMessage, 'Please enter a valid email address');
                    return;
                }

                // Check if user exists
                const users = JSON.parse(localStorage.getItem('users')) || [];
                const user = users.find(u => u.email === email && u.password === password);

                if (user) {
                    // Set logged in user
                    localStorage.setItem('currentUser', JSON.stringify(user));
                    showMessage(successMessage, 'Login successful! Redirecting...');

                    // Redirect based on selected destination
                    setTimeout(() => {
                        if (selectedDestination === 'dashboard') {
                            window.location.href = 'dashboard.html';
                        } else {
                            window.location.href = 'index.html';
                        }
                    }, 1500);
                } else {
                    showMessage(errorMessage, 'Invalid email or password');
                }
            });

            signupForm.addEventListener('submit', function (e) {
                e.preventDefault();
                
                const email = document.getElementById('signup-email').value;
                const password = document.getElementById('signup-password').value;
                const confirm = document.getElementById('signup-confirm').value;

                // Validation
                if (!email || !password || !confirm) {
                    showMessage(errorMessage, 'Please fill in all fields');
                    return;
                }

                if (!validateEmail(email)) {
                    showMessage(errorMessage, 'Please enter a valid email address');
                    return;
                }

                if (password.length < 6) {
                    showMessage(errorMessage, 'Password must be at least 6 characters long');
                    return;
                }

                if (password !== confirm) {
                    showMessage(errorMessage, 'Passwords do not match');
                    return;
                }

                // Check if user already exists
                const users = JSON.parse(localStorage.getItem('users')) || [];
                if (users.some(user => user.email === email)) {
                    showMessage(errorMessage, 'User with this email already exists');
                    return;
                }

                // Create new user
                const newUser = {  email, password };
                users.push(newUser);
                localStorage.setItem('users', JSON.stringify(users));

                showMessage(successMessage, 'Account created successfully! Please log in.');

                // Clear form
                signupForm.reset();

                // Switch to login form after successful signup
                setTimeout(() => {
                    loginTab.click();
                    // Pre-fill the email field in login form
                    document.getElementById('login-email').value = email;
                    document.getElementById('login-password').focus();
                }, 1500);
            });

            // Check if user is already logged in
            if (localStorage.getItem('currentUser')) {
                // If already logged in, redirect to index.html
                window.location.href = 'index.html';
            }

            // Add hover effects to social buttons
            const socialBtns = document.querySelectorAll('.social-btn');
            socialBtns.forEach(btn => {
                btn.addEventListener('mouseenter', function () {
                    this.style.transform = 'translateY(-5px)';
                });

                btn.addEventListener('mouseleave', function () {
                    this.style.transform = 'translateY(0)';
                });
            });
            
            // Initialize destination selection
            initDestinationSelection();
        });
    </script>
</body>
</html>
